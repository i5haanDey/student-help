<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Book spine -->
    <rect x="-64" y="-96" width="128" height="192" rx="12" fill="none" stroke="#fff" stroke-width="14"/>
    <!-- Book pages -->
    <rect x="-50" y="-82" width="100" height="165" rx="6" fill="#fff" opacity="0.2"/>
    <!-- Page lines -->
    <line x1="-35" y1="-40" x2="35" y2="-40" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <line x1="-35" y1="-10" x2="35" y2="-10" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <line x1="-35" y1="20" x2="35" y2="20" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <line x1="-35" y1="50" x2="15" y2="50" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <!-- Star on cover -->
    <path d="M0,-70 L8,-50 L28,-50 L12,-36 L18,-16 L0,-28 L-18,-16 L-12,-36 L-28,-50 L-8,-50 Z" fill="#fbbf24" opacity="0.9"/>
  </g>
</svg>
